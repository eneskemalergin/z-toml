# ===========================================================================
# CUSTOM USER EXTENSIONS
# Demonstrates quoted-key table headers and deep sub-table nesting.
# ===========================================================================

["user.custom-settings"]
  enable_debug          = false
  log_level             = "INFO"
  cache_dir             = "/tmp/proteomics_cache"
  experimental_features = ["new_scoring", "deep_learning_rt", "denovo_assist"]
  # Multi-line inline table (TOML 1.1.0)
  deep_learning = {
    model_path = "/models/rt_predictor_v3.onnx",
    device     = "cpu",
    batch_size = 512,
    fp16       = false,
  }

# ["user.custom-settings".nested] uses a quoted + bare dotted key path
["user.custom-settings".nested]
  key    = "value"
  number = 42
  bits   = 0b10101010
  perms  = 0o755
  magic  = 0xDEADBEEF

["user.custom-settings".nested.deep]
  level  = 3
  active = true
  tag    = "DEEP\u2193NESTED"
